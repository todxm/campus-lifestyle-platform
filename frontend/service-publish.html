<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布服务</title>
    <style>
        body { margin: 0; font-family: Arial, "Microsoft YaHei", sans-serif; background-color: #f5f7fb; color: #222; }
        .page { max-width: 900px; margin: 0 auto; padding: 24px; }
        h1 { margin: 0 0 18px; font-size: 28px; }
        .top-bar { margin-bottom: 18px; }
        .back-button { padding: 10px 18px; border: none; border-radius: 6px; background-color: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
        .back-button:hover { background-color: #1d4ed8; }
        .form-card { background-color: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 22px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; }
        input, textarea { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #d7dce5; border-radius: 6px; font-size: 14px; font-family: inherit; background-color: #fff; }
        textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
        .submit-button { width: 100%; padding: 12px 0; border: none; border-radius: 6px; background-color: #16a34a; color: #fff; font-size: 16px; cursor: pointer; }
        .submit-button:hover { background-color: #15803d; }
        .submit-button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .message { margin: 12px 0; color: #666; }
        .message.success { color: #15803d; }
        .message.error { color: #dc2626; }
    </style>
</head>
<body>
    <main class="page">
        <div class="top-bar">
            <button id="backButton" class="back-button" type="button">返回服务列表</button>
        </div>

        <h1>发布服务</h1>

        <form id="publishForm" class="form-card">
            <div class="form-group">
                <label for="nameInput">服务名称</label>
                <input id="nameInput" type="text" placeholder="例如：代取快递、PPT 美化" required>
            </div>

            <div class="form-group">
                <label for="typeInput">服务类型</label>
                <input id="typeInput" type="text" placeholder="例如：跑腿、学习辅导、技能服务" required>
            </div>

            <div class="form-group">
                <label for="descriptionInput">服务说明</label>
                <textarea id="descriptionInput" placeholder="简单说明你能提供什么服务、时间范围、注意事项等" required></textarea>
            </div>

            <div class="form-group">
                <label for="priceInfoInput">价格说明</label>
                <input id="priceInfoInput" type="text" placeholder="例如：5 元起、价格面议" required>
            </div>

            <div class="form-group">
                <label for="wechatInput">联系微信</label>
                <input id="wechatInput" type="text" placeholder="请输入方便同学联系的微信号" required>
            </div>

            <button id="submitButton" class="submit-button" type="submit">发布服务</button>
        </form>

        <p id="message" class="message"></p>
    </main>

    <script>
        // 后端接口基础地址
        const API_BASE_URL = "http://localhost:8080";

        const backButton = document.getElementById("backButton");
        const publishForm = document.getElementById("publishForm");
        const submitButton = document.getElementById("submitButton");
        const message = document.getElementById("message");
        const nameInput = document.getElementById("nameInput");
        const typeInput = document.getElementById("typeInput");
        const descriptionInput = document.getElementById("descriptionInput");
        const priceInfoInput = document.getElementById("priceInfoInput");
        const wechatInput = document.getElementById("wechatInput");

        // 返回服务列表页
        backButton.addEventListener("click", function () {
            window.location.href = "service.html";
        });

        // 阻止表单默认提交，改用 fetch 发送 JSON
        publishForm.addEventListener("submit", function (event) {
            event.preventDefault();
            publishService();
        });

        // 发布服务：POST http://localhost:8080/service-items
        async function publishService() {
            const service = {
                name: nameInput.value.trim(),
                type: typeInput.value.trim(),
                description: descriptionInput.value.trim(),
                priceInfo: priceInfoInput.value.trim(),
                contactWechat: wechatInput.value.trim()
            };

            if (!service.name || !service.type || !service.description || !service.priceInfo || !service.contactWechat) {
                showMessage("请把服务信息填写完整。", "error");
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = "正在发布...";
            showMessage("正在发布服务...", "");

            try {
                const response = await fetch(API_BASE_URL + "/service-items", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(service)
                });

                if (!response.ok) {
                    showMessage("服务发布失败，请稍后重试。", "error");
                    return;
                }

                showMessage("服务发布成功", "success");

                setTimeout(function () {
                    window.location.href = "service.html";
                }, 1000);
            } catch (error) {
                showMessage("服务发布失败，请确认后端服务已经启动。", "error");
                console.error("请求 POST /service-items 失败：", error);
            } finally {
                submitButton.disabled = false;
                submitButton.textContent = "发布服务";
            }
        }

        // 显示提示信息
        function showMessage(text, type) {
            message.textContent = text;
            message.className = "message";

            if (type) {
                message.classList.add(type);
            }
        }
    </script>
</body>
</html>
