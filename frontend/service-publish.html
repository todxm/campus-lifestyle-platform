<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布服务</title>
    <style>
        body { margin: 0; font-family: Arial, "Microsoft YaHei", sans-serif; background-color: #f5f7fb; color: #222; }
        .page { max-width: 900px; margin: 0 auto; padding: 24px; }
        h1 { margin: 0 0 18px; font-size: 28px; }
        .top-bar { margin-bottom: 18px; }
        .back-button { padding: 10px 18px; border: none; border-radius: 6px; background-color: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
        .back-button:hover { background-color: #1d4ed8; }
        .form-card { background-color: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 22px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; }
        input, select, textarea { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #d7dce5; border-radius: 6px; font-size: 14px; font-family: inherit; background-color: #fff; }
        textarea { min-height: 120px; resize: vertical; line-height: 1.5; }
        /* 服务图片预览：选择文件后显示，使用 contain 避免图片变形 */
        .image-preview { display: none; width: 100%; max-height: 320px; box-sizing: border-box; margin-top: 12px; border: 1px solid #e5e7eb; border-radius: 8px; background-color: #f9fafb; object-fit: contain; }
        .field-help { margin: 8px 0 0; color: #6b7280; font-size: 13px; line-height: 1.5; }
        .submit-button { width: 100%; padding: 12px 0; border: none; border-radius: 6px; background-color: #16a34a; color: #fff; font-size: 16px; cursor: pointer; }
        .submit-button:hover { background-color: #15803d; }
        .submit-button:disabled { background-color: #9ca3af; cursor: not-allowed; }
        .message { margin: 12px 0; color: #666; }
        .message.success { color: #15803d; }
        .message.error { color: #dc2626; }

        /* 六个页面共用的顶部导航栏 */
        .site-nav { background-color: #fff; border-bottom: 1px solid #e5e7eb; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03); }
        .site-nav-inner { max-width: 1100px; margin: 0 auto; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
        .site-title { font-size: 18px; font-weight: bold; color: #111827; }
        .nav-links { display: flex; gap: 8px; }
        .nav-link { padding: 8px 12px; border-radius: 6px; color: #374151; text-decoration: none; font-size: 14px; }
        .nav-link:hover { background-color: #eef2ff; color: #1d4ed8; }
        .nav-link.active { background-color: #2563eb; color: #fff; }

        /* 手机端适配：减小留白，让表单和按钮占满可用宽度 */
        @media (max-width: 600px) {
            .site-nav-inner { padding: 12px 16px; align-items: flex-start; }
            .site-title, .nav-links { width: 100%; }
            .nav-links { display: grid; grid-template-columns: 1fr 1fr; }
            .nav-link { text-align: center; }
            .page { padding: 16px; }
            .back-button, .submit-button { width: 100%; min-height: 44px; }
            .form-card { padding: 16px; }
            input, select, textarea { font-size: 16px; }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="site-nav-inner">
            <div class="site-title">南航上海路校园生活小站</div>
            <div class="nav-links">
                <!-- 服务模块内只保留返回首页和当前模块入口，不直接跳转到二手闲置 -->
                <a class="nav-link" href="home.html">返回首页</a>
                <a class="nav-link active" href="service.html">校园服务</a>
            </div>
        </div>
    </nav>

    <main class="page">
        <div class="top-bar">
            <button id="backButton" class="back-button" type="button">返回服务列表</button>
        </div>

        <h1>发布服务</h1>

        <!-- novalidate 表示由下面的 JavaScript 统一显示更清楚的中文校验提示 -->
        <form id="publishForm" class="form-card" novalidate>
            <div class="form-group">
                <label for="nameInput">服务名称</label>
                <input id="nameInput" type="text" placeholder="例如：校外快递代拿" required>
            </div>

            <div class="form-group">
                <label for="typeInput">服务类型</label>
                <!-- value 为空的第一项用于提示用户必须选择服务类型 -->
                <select id="typeInput" required>
                    <option value="">请选择类型</option>
                    <option value="跑腿代拿">跑腿代拿</option>
                    <option value="宿舍零食">宿舍零食</option>
                    <option value="打印复印">打印复印</option>
                    <option value="电脑维修">电脑维修</option>
                    <option value="驾校咨询">驾校咨询</option>
                    <option value="宽带电话卡">宽带电话卡</option>
                    <option value="周边优惠">周边优惠</option>
                    <option value="其他服务">其他服务</option>
                </select>
            </div>

            <div class="form-group">
                <label for="descriptionInput">服务说明</label>
                <textarea id="descriptionInput" placeholder="例如：可代拿校外快递，晚饭后送到宿舍楼下" required></textarea>
            </div>

            <div class="form-group">
                <label for="priceInfoInput">价格说明</label>
                <input id="priceInfoInput" type="text" placeholder="例如：校外代拿 5 元起，打印复印 0.2 元/张" required>
            </div>

            <div class="form-group">
                <label for="wechatInput">联系微信</label>
                <input id="wechatInput" type="text" placeholder="例如：nuaa_service2026" required>
            </div>

            <div class="form-group">
                <label for="imageInput">服务图片（选填）</label>
                <!-- 第一版只支持单张图片，选择后会在下方显示本地预览 -->
                <input
                    id="imageInput"
                    type="file"
                    accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"
                >
                <p class="field-help">支持 jpg、jpeg、png、webp，单张图片不超过 5MB。</p>
                <img id="imagePreview" class="image-preview" alt="服务图片预览">
            </div>

            <button id="submitButton" class="submit-button" type="submit">发布服务</button>
        </form>

        <p id="message" class="message"></p>
    </main>

    <script>
        // 本地页面请求本机后端，部署到服务器后请求当前服务器的 8080 端口
        const API_HOST = ["localhost", "127.0.0.1"].includes(window.location.hostname)
            ? "localhost"
            : window.location.hostname;
        const API_BASE_URL = "http://" + API_HOST + ":8080";
        const MAX_IMAGE_SIZE = 5 * 1024 * 1024;
        const ALLOWED_IMAGE_TYPES = ["image/jpeg", "image/png", "image/webp"];

        const backButton = document.getElementById("backButton");
        const publishForm = document.getElementById("publishForm");
        const submitButton = document.getElementById("submitButton");
        const message = document.getElementById("message");
        const nameInput = document.getElementById("nameInput");
        const typeInput = document.getElementById("typeInput");
        const descriptionInput = document.getElementById("descriptionInput");
        const priceInfoInput = document.getElementById("priceInfoInput");
        const wechatInput = document.getElementById("wechatInput");
        const imageInput = document.getElementById("imageInput");
        const imagePreview = document.getElementById("imagePreview");
        let previewObjectUrl = "";

        // 返回服务列表页
        backButton.addEventListener("click", function () {
            window.location.href = "service.html";
        });

        // 阻止表单默认提交，改用 fetch 发送 JSON
        publishForm.addEventListener("submit", function (event) {
            event.preventDefault();
            publishService();
        });

        // 选择图片后先检查格式和大小，再用浏览器临时地址显示预览
        imageInput.addEventListener("change", function () {
            const imageFile = imageInput.files[0];

            if (previewObjectUrl) {
                URL.revokeObjectURL(previewObjectUrl);
                previewObjectUrl = "";
            }

            imagePreview.style.display = "none";
            imagePreview.removeAttribute("src");

            if (!imageFile) {
                return;
            }

            if (!ALLOWED_IMAGE_TYPES.includes(imageFile.type)) {
                imageInput.value = "";
                showMessage("请选择 jpg、jpeg、png 或 webp 格式的图片", "error");
                return;
            }

            if (imageFile.size > MAX_IMAGE_SIZE) {
                imageInput.value = "";
                showMessage("服务图片不能超过 5MB", "error");
                return;
            }

            previewObjectUrl = URL.createObjectURL(imageFile);
            imagePreview.src = previewObjectUrl;
            imagePreview.style.display = "block";
            showMessage("", "");
        });

        // 发布服务：如有图片先上传，再 POST /service-items 保存服务和 imageUrl
        async function publishService() {
            // 按钮禁用期间不再提交，避免用户连续点击产生重复请求
            if (submitButton.disabled) {
                return;
            }

            const service = {
                name: nameInput.value.trim(),
                type: typeInput.value.trim(),
                description: descriptionInput.value.trim(),
                priceInfo: priceInfoInput.value.trim(),
                contactWechat: wechatInput.value.trim(),
                imageUrl: null
            };

            // 按顺序检查每个字段，让用户能看到具体、容易理解的错误提示
            if (!service.name) {
                showMessage("请输入服务名称", "error");
                return;
            }

            if (service.name.length < 2) {
                showMessage("服务名称至少需要 2 个字", "error");
                return;
            }

            if (!service.type) {
                showMessage("请选择服务类型", "error");
                return;
            }

            if (!service.description) {
                showMessage("请输入服务说明", "error");
                return;
            }

            if (service.description.length < 5) {
                showMessage("服务说明至少需要 5 个字", "error");
                return;
            }

            if (!service.priceInfo) {
                showMessage("请输入价格说明", "error");
                return;
            }

            if (!service.contactWechat) {
                showMessage("请输入联系微信", "error");
                return;
            }

            const imageFile = imageInput.files[0];
            if (imageFile && !ALLOWED_IMAGE_TYPES.includes(imageFile.type)) {
                showMessage("请选择 jpg、jpeg、png 或 webp 格式的图片", "error");
                return;
            }

            if (imageFile && imageFile.size > MAX_IMAGE_SIZE) {
                showMessage("服务图片不能超过 5MB", "error");
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = "正在发布...";
            showMessage("正在发布服务...", "");

            let publishSucceeded = false;

            try {
                // 图片为选填；选择图片时先上传，再把返回地址放入服务 JSON
                if (imageFile) {
                    showMessage("正在上传服务图片...", "");
                    service.imageUrl = await uploadServiceImage(imageFile);
                }

                showMessage("正在发布服务...", "");
                const response = await fetch(API_BASE_URL + "/service-items", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(service)
                });

                if (!response.ok) {
                    showMessage("服务发布失败，请稍后重试。", "error");
                    return;
                }

                publishSucceeded = true;
                showMessage("服务发布成功，即将返回服务列表", "success");

                setTimeout(function () {
                    window.location.href = "service.html";
                }, 1000);
            } catch (error) {
                showMessage(error.message || "服务发布失败，请确认后端服务已经启动。", "error");
                console.error("上传图片或发布服务失败：", error);
            } finally {
                // 发布失败时允许再次提交；成功时保持禁用，等待页面自动跳转
                if (!publishSucceeded) {
                    submitButton.disabled = false;
                    submitButton.textContent = "发布服务";
                }
            }
        }

        // 使用 FormData 上传图片，字段名 file 与后端 @RequestParam("file") 保持一致
        async function uploadServiceImage(imageFile) {
            const formData = new FormData();
            formData.append("file", imageFile);

            const response = await fetch(API_BASE_URL + "/upload/service-image", {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                let errorMessage = "图片上传失败，请检查图片格式和大小";
                try {
                    const errorData = await response.json();
                    if (errorData.message) {
                        errorMessage = errorData.message;
                    }
                } catch (error) {
                    // 后端没有返回 JSON 时继续使用上面的中文提示
                }
                throw new Error(errorMessage);
            }

            const uploadResult = await response.json();
            if (!uploadResult.imageUrl) {
                throw new Error("后端没有返回图片地址");
            }

            return uploadResult.imageUrl;
        }

        // 显示提示信息
        function showMessage(text, type) {
            message.textContent = text;
            message.className = "message";

            if (type) {
                message.classList.add(type);
            }
        }
    </script>
</body>
</html>
