<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园服务列表</title>
    <style>
        /* 页面基础样式：和商品首页 index.html 保持一致 */
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background-color: #f5f7fb;
            color: #222;
        }

        /* 主体容器：限制最大宽度，让内容在大屏幕上也比较集中 */
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }

        /* 页面顶部：左边是标题，右边是发布服务按钮 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .publish-button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background-color: #16a34a;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .publish-button:hover {
            background-color: #15803d;
        }

        /* 顶部导航栏：多个页面共用，方便在商品和服务页面之间切换 */
        .site-nav {
            background-color: #fff;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .site-nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .site-title {
            font-size: 18px;
            font-weight: bold;
            color: #111827;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 12px;
            border-radius: 6px;
            color: #374151;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-link:hover {
            background-color: #eef2ff;
            color: #1d4ed8;
        }

        .nav-link.active {
            background-color: #2563eb;
            color: #fff;
        }

        /* 搜索区域：横向排列关键词输入框、类型输入框和按钮 */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-bar input,
        .search-bar select {
            flex: 1;
            min-width: 180px;
            padding: 10px 12px;
            border: 1px solid #d7dce5;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background-color: #fff;
        }

        .search-bar button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background-color: #2563eb;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .search-bar button:hover {
            background-color: #1d4ed8;
        }

        /* 状态提示文字，比如加载中、暂无服务、请求失败 */
        .message {
            margin: 12px 0;
            color: #666;
        }

        /* 服务列表：使用网格布局，自动适配屏幕宽度 */
        .service-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        /* 服务卡片：和商品卡片风格保持一致 */
        .service-card {
            background-color: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .service-name {
            margin: 0 0 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .service-price {
            margin: 0 0 10px;
            color: #dc2626;
            font-size: 18px;
            font-weight: bold;
        }

        .service-info {
            margin: 6px 0;
            color: #555;
            font-size: 14px;
        }

        .service-description {
            min-height: 42px;
            margin: 10px 0 14px;
            color: #444;
            font-size: 14px;
            line-height: 1.5;
        }

        .detail-button {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-radius: 6px;
            background-color: #16a34a;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .detail-button:hover {
            background-color: #15803d;
        }

        /* 手机端适配：缩小留白，搜索区域纵向排列，卡片保持单列 */
        @media (max-width: 600px) {
            .site-nav-inner {
                padding: 12px 16px;
                align-items: flex-start;
            }

            .site-title,
            .nav-links {
                width: 100%;
            }

            .nav-links {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            .nav-link {
                text-align: center;
            }

            .page {
                padding: 16px;
            }

            .page-header {
                align-items: stretch;
            }

            .page-header h1,
            .publish-button {
                width: 100%;
            }

            .publish-button {
                min-height: 44px;
            }

            .search-bar {
                flex-direction: column;
            }

            .search-bar input,
            .search-bar select,
            .search-bar button {
                width: 100%;
                min-width: 0;
                box-sizing: border-box;
                min-height: 44px;
            }

            .service-list {
                grid-template-columns: 1fr;
            }

            .service-card {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="site-nav-inner">
            <div class="site-title">南航上海路校园生活小站</div>
            <div class="nav-links">
                <!-- 顶部导航只负责模块切换，active 表示当前模块 -->
                <a class="nav-link" href="index.html">二手闲置</a>
                <a class="nav-link active" href="service.html">校园服务</a>
            </div>
        </div>
    </nav>

    <main class="page">
        <div class="page-header">
            <h1>校园服务</h1>
            <button id="publishButton" class="publish-button" type="button">发布服务</button>
        </div>

        <div class="search-bar">
            <!-- keyword 会传给后端的 /service-items/search?keyword=xxx -->
            <input id="keywordInput" type="text" placeholder="输入服务关键词">

            <!-- value 为空表示“全部类型”，搜索时不会传 type 参数 -->
            <select id="typeInput">
                <option value="">全部类型</option>
                <option value="跑腿代拿">跑腿代拿</option>
                <option value="宿舍零食">宿舍零食</option>
                <option value="打印复印">打印复印</option>
                <option value="电脑维修">电脑维修</option>
                <option value="驾校咨询">驾校咨询</option>
                <option value="宽带电话卡">宽带电话卡</option>
                <option value="周边优惠">周边优惠</option>
                <option value="其他服务">其他服务</option>
            </select>

            <button id="searchButton" type="button">搜索</button>
            <button id="resetButton" type="button">查看全部</button>
        </div>

        <p id="message" class="message">正在加载服务...</p>

        <!-- JavaScript 会把服务卡片插入到这个容器中 -->
        <section id="serviceList" class="service-list"></section>
    </main>

    <script>
        // 后端接口基础地址，后端 Spring Boot 默认运行在 8080 端口
        const API_BASE_URL = "http://localhost:8080";

        // 获取页面上的元素，后面会反复使用
        const serviceList = document.getElementById("serviceList");
        const message = document.getElementById("message");
        const keywordInput = document.getElementById("keywordInput");
        const typeInput = document.getElementById("typeInput");
        const searchButton = document.getElementById("searchButton");
        const resetButton = document.getElementById("resetButton");
        const publishButton = document.getElementById("publishButton");

        // 页面刚打开时，自动请求全部服务
        loadServices();

        // 点击“发布服务”按钮，跳转到发布服务页面
        publishButton.addEventListener("click", function () {
            window.location.href = "service-publish.html";
        });

        // 点击“搜索”时，根据关键词和类型请求 /service-items/search
        searchButton.addEventListener("click", function () {
            searchServices();
        });

        // 在关键词输入框按下 Enter 时，执行与点击“搜索”按钮相同的搜索
        keywordInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                searchServices();
            }
        });

        // 服务类型发生变化时立即搜索，并自动结合输入框中已有的关键词
        typeInput.addEventListener("change", function () {
            searchServices();
        });

        // 点击“查看全部”时，清空输入框并重新请求 /service-items
        resetButton.addEventListener("click", function () {
            keywordInput.value = "";
            typeInput.value = "";
            loadServices();
        });

        // 请求全部服务：GET http://localhost:8080/service-items
        async function loadServices() {
            message.textContent = "正在加载服务...";
            serviceList.innerHTML = "";

            try {
                const response = await fetch(API_BASE_URL + "/service-items");

                if (!response.ok) {
                    message.textContent = "服务加载失败，请确认后端接口是否正常。";
                    return;
                }

                const services = await response.json();
                renderServices(services);
            } catch (error) {
                message.textContent = "服务加载失败，请确认后端服务已经启动。";
                console.error("请求 /service-items 失败：", error);
            }
        }

        // 搜索服务：GET http://localhost:8080/service-items/search?keyword=xxx&type=xxx
        async function searchServices() {
            const keyword = keywordInput.value.trim();
            const type = typeInput.value.trim();

            // URLSearchParams 可以帮我们安全地拼接查询参数
            const params = new URLSearchParams();
            if (keyword) {
                params.append("keyword", keyword);
            }
            if (type) {
                params.append("type", type);
            }

            message.textContent = "正在搜索服务...";
            serviceList.innerHTML = "";

            try {
                const response = await fetch(API_BASE_URL + "/service-items/search?" + params.toString());

                if (!response.ok) {
                    message.textContent = "搜索失败，请确认后端接口是否正常。";
                    return;
                }

                const services = await response.json();
                renderServices(services);
            } catch (error) {
                message.textContent = "搜索失败，请确认后端服务已经启动。";
                console.error("请求 /service-items/search 失败：", error);
            }
        }

        // 把后端返回的服务数组显示成卡片
        function renderServices(services) {
            serviceList.innerHTML = "";

            if (!services || services.length === 0) {
                message.textContent = "暂无服务。";
                return;
            }

            message.textContent = "";

            services.forEach(function (service) {
                const card = document.createElement("article");
                card.className = "service-card";

                // 使用 textContent 放入后端数据，可以避免特殊字符被当成 HTML 执行
                const name = document.createElement("h2");
                name.className = "service-name";
                name.textContent = service.name || "未命名服务";

                const priceInfo = document.createElement("p");
                priceInfo.className = "service-price";
                priceInfo.textContent = service.priceInfo || "价格面议";

                const type = document.createElement("p");
                type.className = "service-info";
                type.textContent = "服务类型：" + (service.type || "未填写");

                const description = document.createElement("p");
                description.className = "service-description";
                description.textContent = service.description || "暂无说明";

                const contactWechat = document.createElement("p");
                contactWechat.className = "service-info";
                contactWechat.textContent = "联系微信：" + (service.contactWechat || "未填写");

                const button = document.createElement("button");
                button.className = "detail-button";
                button.type = "button";
                button.textContent = "查看详情";

                // 点击按钮后跳转到服务详情页，并把服务 id 放到地址栏参数中
                button.addEventListener("click", function () {
                    window.location.href = "service-detail.html?id=" + service.id;
                });

                card.appendChild(name);
                card.appendChild(priceInfo);
                card.appendChild(type);
                card.appendChild(description);
                card.appendChild(contactWechat);
                card.appendChild(button);
                serviceList.appendChild(card);
            });
        }
    </script>
</body>
</html>
