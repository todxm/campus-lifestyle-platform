<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反馈建议</title>
    <style>
        /* 页面基础样式与 home.html 保持一致 */
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background-color: #f5f7fb;
            color: #222;
        }

        .site-nav {
            background-color: #fff;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .site-nav-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 12px 24px;
        }

        .site-title {
            font-size: 18px;
            font-weight: bold;
            color: #111827;
        }

        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px 24px;
        }

        .page-header {
            margin-bottom: 20px;
        }

        .page-header h1 {
            margin: 0 0 10px;
            font-size: 30px;
            color: #111827;
        }

        .page-header p {
            max-width: 720px;
            margin: 0;
            color: #4b5563;
            line-height: 1.7;
        }

        .feedback-card {
            padding: 22px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .feedback-card h2 {
            margin: 0 0 12px;
            font-size: 20px;
            color: #111827;
        }

        .feedback-list {
            margin: 0 0 24px;
            padding-left: 22px;
            color: #4b5563;
            line-height: 1.9;
        }

        .wechat-box {
            padding: 16px;
            border-radius: 8px;
            background-color: #f5f7fb;
        }

        .wechat-label {
            margin: 0 0 10px;
            color: #374151;
            font-weight: bold;
        }

        .wechat-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .wechat-id {
            color: #111827;
            font-size: 16px;
            word-break: break-word;
        }

        button {
            min-height: 40px;
            padding: 9px 16px;
            border: none;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
        }

        .copy-button {
            background-color: #2563eb;
            color: #fff;
        }

        .copy-button:hover {
            background-color: #1d4ed8;
        }

        .back-button {
            margin-top: 18px;
            background-color: #fff;
            border: 1px solid #d7dce5;
            color: #374151;
        }

        .back-button:hover {
            background-color: #f3f4f6;
        }

        .message {
            min-height: 22px;
            margin: 12px 0 0;
            color: #15803d;
            font-size: 14px;
        }

        /* 手机端缩小留白，并让操作按钮更容易点击 */
        @media (max-width: 600px) {
            .site-nav-inner {
                padding: 12px 16px;
            }

            .page {
                padding: 24px 16px 16px;
            }

            .page-header h1 {
                font-size: 26px;
            }

            .feedback-card {
                padding: 18px;
            }

            .wechat-actions {
                align-items: stretch;
                flex-direction: column;
            }

            .copy-button,
            .back-button {
                width: 100%;
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="site-nav-inner">
            <div class="site-title">南航上海路校园生活小站</div>
        </div>
    </nav>

    <main class="page">
        <header class="page-header">
            <h1>反馈建议</h1>
            <p>
                这是南航上海路校园生活小站的早期测试版本。<br>
                如果你在使用过程中遇到问题，或者希望增加某些功能，可以联系站长反馈。
            </p>
        </header>

        <section class="feedback-card">
            <h2>你可以反馈这些内容</h2>
            <ul class="feedback-list">
                <li>商品发布是否方便</li>
                <li>校园服务分类是否够用</li>
                <li>页面有没有不好用的地方</li>
                <li>你还希望增加什么功能</li>
            </ul>

            <div class="wechat-box">
                <p class="wechat-label">站长微信</p>
                <div class="wechat-actions">
                    <!-- 之后只需要替换这里的微信号文字和下方 JavaScript 常量 -->
                    <span class="wechat-id">your_wechat_id</span>
                    <button id="copyButton" class="copy-button" type="button">复制站长微信</button>
                </div>
                <p id="message" class="message"></p>
            </div>

            <button id="backButton" class="back-button" type="button">返回首页</button>
        </section>
    </main>

    <script>
        // 以后更换站长微信时，同时修改这里和页面中显示的微信号
        const webmasterWechat = "your_wechat_id";
        const copyButton = document.getElementById("copyButton");
        const backButton = document.getElementById("backButton");
        const message = document.getElementById("message");

        copyButton.addEventListener("click", function () {
            copyWechat(webmasterWechat);
        });

        backButton.addEventListener("click", function () {
            window.location.href = "home.html";
        });

        // 优先使用浏览器剪贴板 API，不支持时使用临时 textarea 兼容复制
        async function copyWechat(text) {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                } else {
                    fallbackCopyText(text);
                }
                message.textContent = "站长微信已复制";
            } catch (error) {
                try {
                    fallbackCopyText(text);
                    message.textContent = "站长微信已复制";
                } catch (fallbackError) {
                    message.textContent = "复制失败，请手动复制微信号";
                    console.error("复制站长微信失败：", fallbackError);
                }
            }
        }

        // 兼容不支持 navigator.clipboard 的旧浏览器
        function fallbackCopyText(text) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.select();

            const copied = document.execCommand("copy");
            document.body.removeChild(textarea);
            if (!copied) {
                throw new Error("浏览器未能完成复制");
            }
        }
    </script>
</body>
</html>
