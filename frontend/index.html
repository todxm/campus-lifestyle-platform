<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园二手商品列表</title>
    <style>
        /* 页面基础样式：让内容居中，并设置一个清爽的背景色 */
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background-color: #f5f7fb;
            color: #222;
        }

        /* 主体容器：限制最大宽度，避免在大屏幕上内容太散 */
        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            margin: 0;
            font-size: 28px;
        }

        /* 页面顶部：左边是标题，右边是发布商品按钮 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .publish-button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background-color: #16a34a;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .publish-button:hover {
            background-color: #15803d;
        }

        /* 顶部导航栏：多个页面共用，方便在商品和服务页面之间切换 */
        .site-nav {
            background-color: #fff;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .site-nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .site-title {
            font-size: 18px;
            font-weight: bold;
            color: #111827;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 12px;
            border-radius: 6px;
            color: #374151;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-link:hover {
            background-color: #eef2ff;
            color: #1d4ed8;
        }

        .nav-link.active {
            background-color: #2563eb;
            color: #fff;
        }

        /* 搜索区域：横向排列搜索框、分类框和按钮 */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-bar input,
        .search-bar select {
            flex: 1;
            min-width: 180px;
            padding: 10px 12px;
            border: 1px solid #d7dce5;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background-color: #fff;
        }

        .search-bar button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background-color: #2563eb;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .search-bar button:hover {
            background-color: #1d4ed8;
        }

        /* 状态提示文字，比如加载中、暂无商品、请求失败 */
        .message {
            margin: 12px 0;
            color: #666;
        }

        /* 商品列表：使用网格布局，自动适配屏幕宽度 */
        .product-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        /* 商品卡片 */
        .product-card {
            background-color: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }

        /* 固定图片比例并使用 object-fit，手机和电脑上都不会拉伸变形 */
        .product-image,
        .product-image-placeholder {
            width: 100%;
            aspect-ratio: 4 / 3;
            display: block;
            background-color: #f3f4f6;
        }

        .product-image {
            object-fit: cover;
        }

        .product-image-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9ca3af;
            font-size: 14px;
        }

        .product-card-content {
            padding: 16px;
        }

        /* 空状态卡片占满列表区域，用更友好的方式引导用户发布商品 */
        .empty-state {
            grid-column: 1 / -1;
            padding: 36px 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .empty-state h2 {
            margin: 0 0 10px;
            font-size: 20px;
            color: #111827;
        }

        .empty-state p {
            margin: 0 auto 18px;
            max-width: 520px;
            color: #6b7280;
            font-size: 14px;
            line-height: 1.6;
        }

        .empty-state-button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background-color: #16a34a;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .empty-state-button:hover {
            background-color: #15803d;
        }

        .product-title {
            margin: 0 0 8px;
            font-size: 18px;
            font-weight: bold;
        }

        .product-price {
            margin: 0 0 10px;
            color: #dc2626;
            font-size: 20px;
            font-weight: bold;
        }

        .product-info {
            margin: 6px 0;
            color: #555;
            font-size: 14px;
        }

        /* 分类和成色使用小标签展示，标签过长时会自动换行 */
        .badge-list {
            display: flex;
            gap: 8px;
            margin: 6px 0;
            flex-wrap: wrap;
        }

        .badge {
            max-width: 100%;
            box-sizing: border-box;
            padding: 4px 9px;
            border-radius: 6px;
            background-color: #eef2ff;
            color: #1d4ed8;
            font-size: 12px;
            line-height: 1.4;
            word-break: break-word;
        }

        .badge.condition {
            background-color: #ecfdf5;
            color: #15803d;
        }

        .product-description {
            min-height: 42px;
            margin: 10px 0 14px;
            color: #444;
            font-size: 14px;
            line-height: 1.5;
        }

        .detail-button {
            width: 100%;
            padding: 10px 0;
            border: none;
            border-radius: 6px;
            background-color: #16a34a;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .detail-button:hover {
            background-color: #15803d;
        }

        /* 手机端适配：缩小留白，搜索区域纵向排列，卡片保持单列 */
        @media (max-width: 600px) {
            .site-nav-inner {
                padding: 12px 16px;
                align-items: flex-start;
            }

            .site-title,
            .nav-links {
                width: 100%;
            }

            .nav-links {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            .nav-link {
                text-align: center;
            }

            .page {
                padding: 16px;
            }

            .page-header {
                align-items: stretch;
            }

            .page-header h1,
            .publish-button {
                width: 100%;
            }

            .publish-button {
                min-height: 44px;
            }

            .search-bar {
                flex-direction: column;
            }

            .search-bar input,
            .search-bar select,
            .search-bar button {
                width: 100%;
                min-width: 0;
                box-sizing: border-box;
                min-height: 44px;
            }

            .product-list {
                grid-template-columns: 1fr;
            }

            .product-card {
                padding: 0;
            }

            .empty-state {
                padding: 28px 16px;
            }

            .empty-state-button {
                width: 100%;
                min-height: 44px;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="site-nav-inner">
            <div class="site-title">南航上海路校园生活小站</div>
            <div class="nav-links">
                <!-- 二手模块内只保留返回首页和当前模块入口，不直接跳转到校园服务 -->
                <a class="nav-link" href="home.html">返回首页</a>
                <a class="nav-link active" href="index.html">二手闲置</a>
            </div>
        </div>
    </nav>

    <main class="page">
        <div class="page-header">
            <h1>校园二手商品</h1>
            <button id="publishButton" class="publish-button" type="button">发布商品</button>
        </div>

        <div class="search-bar">
            <!-- keyword 会传给后端的 /products/search?keyword=xxx -->
            <input id="keywordInput" type="text" placeholder="输入商品关键词">

            <!-- value 为空表示“全部分类”，搜索时不会传 category 参数 -->
            <select id="categoryInput">
                <option value="">全部分类</option>
                <option value="数码电子">数码电子</option>
                <option value="教材资料">教材资料</option>
                <option value="宿舍用品">宿舍用品</option>
                <option value="交通出行">交通出行</option>
                <option value="服饰鞋包">服饰鞋包</option>
                <option value="运动户外">运动户外</option>
                <option value="生活杂物">生活杂物</option>
                <option value="其他">其他</option>
            </select>

            <button id="searchButton" type="button">搜索</button>
            <button id="resetButton" type="button">查看全部</button>
        </div>

        <p id="message" class="message">正在加载商品...</p>

        <!-- JavaScript 会把商品卡片插入到这个容器中 -->
        <section id="productList" class="product-list"></section>
    </main>

    <script>
        // 本地打开页面时请求本机后端，部署到服务器后请求当前服务器的 8080 端口
        const API_HOST = ["localhost", "127.0.0.1"].includes(window.location.hostname)
            ? "localhost"
            : window.location.hostname;
        const API_BASE_URL = "http://" + API_HOST + ":8080";

        // 获取页面上的元素，后面会反复使用
        const productList = document.getElementById("productList");
        const message = document.getElementById("message");
        const keywordInput = document.getElementById("keywordInput");
        const categoryInput = document.getElementById("categoryInput");
        const searchButton = document.getElementById("searchButton");
        const resetButton = document.getElementById("resetButton");
        const publishButton = document.getElementById("publishButton");

        // 页面刚打开时，自动请求全部商品
        loadProducts();

        // 点击“搜索”时，根据关键词和分类请求 /products/search
        searchButton.addEventListener("click", function () {
            searchProducts();
        });

        // 在关键词输入框按下 Enter 时，执行与点击“搜索”按钮相同的搜索
        keywordInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                searchProducts();
            }
        });

        // 分类发生变化时立即搜索，并自动结合输入框中已有的关键词
        categoryInput.addEventListener("change", function () {
            searchProducts();
        });

        // 点击“查看全部”时，清空输入框并重新请求 /products
        resetButton.addEventListener("click", function () {
            resetProductFilters();
        });

        // 清空商品搜索条件并重新加载全部商品，供两个“查看全部”按钮复用
        function resetProductFilters() {
            keywordInput.value = "";
            categoryInput.value = "";
            loadProducts();
        }

        // 点击“发布商品”按钮，跳转到发布商品页面
        publishButton.addEventListener("click", function () {
            window.location.href = "publish.html";
        });

        // 请求全部商品：GET http://localhost:8080/products
        async function loadProducts() {
            message.textContent = "正在加载商品...";
            productList.innerHTML = "";

            try {
                const response = await fetch(API_BASE_URL + "/products");
                const products = await response.json();
                renderProducts(products, false);
            } catch (error) {
                message.textContent = "商品加载失败，请确认后端服务已经启动。";
                console.error("请求 /products 失败：", error);
            }
        }

        // 搜索商品：GET http://localhost:8080/products/search?keyword=xxx&category=xxx
        async function searchProducts() {
            const keyword = keywordInput.value.trim();
            const category = categoryInput.value.trim();

            // URLSearchParams 可以帮我们安全地拼接查询参数
            const params = new URLSearchParams();
            if (keyword) {
                params.append("keyword", keyword);
            }
            if (category) {
                params.append("category", category);
            }

            message.textContent = "正在搜索商品...";
            productList.innerHTML = "";

            try {
                const response = await fetch(API_BASE_URL + "/products/search?" + params.toString());
                const products = await response.json();
                renderProducts(products, true);
            } catch (error) {
                message.textContent = "搜索失败，请确认后端服务已经启动。";
                console.error("请求 /products/search 失败：", error);
            }
        }

        // isSearchResult 用来区分“平台没有商品”和“本次搜索没有匹配结果”
        function renderProducts(products, isSearchResult) {
            productList.innerHTML = "";

            if (!products || products.length === 0) {
                message.textContent = "";

                // 根据当前是否为搜索结果，显示不同的空状态提示和按钮
                const emptyState = document.createElement("section");
                emptyState.className = "empty-state";

                const title = document.createElement("h2");
                title.textContent = isSearchResult ? "没有找到相关商品" : "还没有二手闲置";

                const description = document.createElement("p");
                description.textContent = isSearchResult
                    ? "换个关键词或分类试试，也可以查看全部商品。"
                    : "可以先发布一个商品，让同学们看到你的闲置物品。";

                const button = document.createElement("button");
                button.className = "empty-state-button";
                button.type = "button";
                button.textContent = isSearchResult ? "查看全部" : "发布商品";
                button.addEventListener("click", function () {
                    if (isSearchResult) {
                        resetProductFilters();
                    } else {
                        window.location.href = "publish.html";
                    }
                });

                emptyState.appendChild(title);
                emptyState.appendChild(description);
                emptyState.appendChild(button);
                productList.appendChild(emptyState);
                return;
            }

            message.textContent = "";

            products.forEach(function (product) {
                const card = document.createElement("article");
                card.className = "product-card";

                // 有图片时显示商品图，没有图片时显示统一占位区域
                const imageArea = createProductImage(product);
                const cardContent = document.createElement("div");
                cardContent.className = "product-card-content";

                // 使用 textContent 放入用户数据，可以避免把特殊字符当成 HTML 执行
                const title = document.createElement("h2");
                title.className = "product-title";
                title.textContent = product.title || "未命名商品";

                const price = document.createElement("p");
                price.className = "product-price";
                price.textContent = "￥" + (product.price ?? "0");

                // 分类和成色放进同一个标签组，信息更容易快速浏览
                const badgeList = document.createElement("div");
                badgeList.className = "badge-list";

                const category = document.createElement("span");
                category.className = "badge";
                category.textContent = "分类：" + (product.category || "未填写");

                const condition = document.createElement("span");
                condition.className = "badge condition";
                condition.textContent = "成色：" + (product.conditionLevel || "未填写");

                badgeList.appendChild(category);
                badgeList.appendChild(condition);

                const description = document.createElement("p");
                description.className = "product-description";
                description.textContent = product.description || "暂无描述";

                const button = document.createElement("button");
                button.className = "detail-button";
                button.type = "button";
                button.textContent = "查看详情";

                // 点击按钮后跳转到详情页，并把商品 id 放到地址栏参数中
                button.addEventListener("click", function () {
                    window.location.href = "detail.html?id=" + product.id;
                });

                cardContent.appendChild(title);
                cardContent.appendChild(price);
                cardContent.appendChild(badgeList);
                cardContent.appendChild(description);
                cardContent.appendChild(button);
                card.appendChild(imageArea);
                card.appendChild(cardContent);
                productList.appendChild(card);
            });
        }

        // 创建商品卡片顶部的图片或“暂无图片”占位区域
        function createProductImage(product) {
            if (!product.imageUrl) {
                const placeholder = document.createElement("div");
                placeholder.className = "product-image-placeholder";
                placeholder.textContent = "暂无图片";
                return placeholder;
            }

            const image = document.createElement("img");
            image.className = "product-image";
            image.src = product.imageUrl;
            image.alt = product.title ? product.title + "的商品图片" : "商品图片";
            image.loading = "lazy";

            // 图片地址失效时替换为占位区域，避免页面显示破损图标
            image.addEventListener("error", function () {
                const placeholder = document.createElement("div");
                placeholder.className = "product-image-placeholder";
                placeholder.textContent = "图片加载失败";
                image.replaceWith(placeholder);
            });

            return image;
        }
    </script>
</body>
</html>
