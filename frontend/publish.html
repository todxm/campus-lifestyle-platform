<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布商品</title>
    <style>
        /* 页面基础样式：和首页、详情页保持一致 */
        body {
            margin: 0;
            font-family: Arial, "Microsoft YaHei", sans-serif;
            background-color: #f5f7fb;
            color: #222;
        }

        /* 主体容器：限制最大宽度，让表单不要铺满整个屏幕 */
        .page {
            max-width: 900px;
            margin: 0 auto;
            padding: 24px;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 28px;
        }

        /* 顶部按钮区域 */
        .top-bar {
            margin-bottom: 18px;
        }

        .back-button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background-color: #2563eb;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        .back-button:hover {
            background-color: #1d4ed8;
        }

        /* 表单卡片：和详情页卡片风格保持一致 */
        .form-card {
            background-color: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 22px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        input,
        select,
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid #d7dce5;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background-color: #fff;
        }

        textarea {
            min-height: 120px;
            resize: vertical;
            line-height: 1.5;
        }

        .submit-button {
            width: 100%;
            padding: 12px 0;
            border: none;
            border-radius: 6px;
            background-color: #16a34a;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-button:hover {
            background-color: #15803d;
        }

        .submit-button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        /* 状态提示文字，比如发布成功、发布失败 */
        .message {
            margin: 12px 0;
            color: #666;
        }

        .message.success {
            color: #15803d;
        }

        .message.error {
            color: #dc2626;
        }

        /* 六个页面共用的顶部导航栏 */
        .site-nav {
            background-color: #fff;
            border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .site-nav-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .site-title {
            font-size: 18px;
            font-weight: bold;
            color: #111827;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-link {
            padding: 8px 12px;
            border-radius: 6px;
            color: #374151;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-link:hover {
            background-color: #eef2ff;
            color: #1d4ed8;
        }

        .nav-link.active {
            background-color: #2563eb;
            color: #fff;
        }

        /* 手机端适配：减小留白，让表单和按钮占满可用宽度 */
        @media (max-width: 600px) {
            .site-nav-inner {
                padding: 12px 16px;
                align-items: flex-start;
            }

            .site-title,
            .nav-links {
                width: 100%;
            }

            .nav-links {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            .nav-link {
                text-align: center;
            }

            .page {
                padding: 16px;
            }

            .back-button,
            .submit-button {
                width: 100%;
                min-height: 44px;
            }

            .form-card {
                padding: 16px;
            }

            input,
            select,
            textarea {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="site-nav-inner">
            <div class="site-title">南航上海路校园生活小站</div>
            <div class="nav-links">
                <!-- 发布商品属于二手闲置模块，所以二手闲置保持高亮 -->
                <a class="nav-link active" href="index.html">二手闲置</a>
                <a class="nav-link" href="service.html">校园服务</a>
            </div>
        </div>
    </nav>

    <main class="page">
        <div class="top-bar">
            <button id="backButton" class="back-button" type="button">返回首页</button>
        </div>

        <h1>发布商品</h1>

        <!-- novalidate 表示由下面的 JavaScript 统一显示更清楚的中文校验提示 -->
        <form id="publishForm" class="form-card" novalidate>
            <div class="form-group">
                <label for="titleInput">商品标题</label>
                <input id="titleInput" type="text" placeholder="例如：九成新宿舍台灯" required>
            </div>

            <div class="form-group">
                <label for="descriptionInput">商品描述</label>
                <textarea id="descriptionInput" placeholder="例如：宿舍自用一年，功能正常，可在宿舍楼下看货" required></textarea>
            </div>

            <div class="form-group">
                <label for="priceInput">价格</label>
                <input id="priceInput" type="number" min="0" step="0.01" placeholder="例如：35" required>
            </div>

            <div class="form-group">
                <label for="categoryInput">分类</label>
                <!-- value 为空的第一项用于提示用户必须选择分类 -->
                <select id="categoryInput" required>
                    <option value="">请选择分类</option>
                    <option value="数码电子">数码电子</option>
                    <option value="教材资料">教材资料</option>
                    <option value="宿舍用品">宿舍用品</option>
                    <option value="交通出行">交通出行</option>
                    <option value="服饰鞋包">服饰鞋包</option>
                    <option value="运动户外">运动户外</option>
                    <option value="生活杂物">生活杂物</option>
                    <option value="其他">其他</option>
                </select>
            </div>

            <div class="form-group">
                <label for="conditionInput">成色</label>
                <input id="conditionInput" type="text" placeholder="例如：九成新，有轻微使用痕迹" required>
            </div>

            <div class="form-group">
                <label for="wechatInput">卖家微信</label>
                <input id="wechatInput" type="text" placeholder="例如：nuaa_student2026" required>
            </div>

            <button id="submitButton" class="submit-button" type="submit">发布商品</button>
        </form>

        <p id="message" class="message"></p>
    </main>

    <script>
        // 后端接口基础地址，后端 Spring Boot 默认运行在 8080 端口
        const API_BASE_URL = "http://localhost:8080";

        // 获取页面上的元素，提交表单时会读取这些输入框的值
        const backButton = document.getElementById("backButton");
        const publishForm = document.getElementById("publishForm");
        const submitButton = document.getElementById("submitButton");
        const message = document.getElementById("message");
        const titleInput = document.getElementById("titleInput");
        const descriptionInput = document.getElementById("descriptionInput");
        const priceInput = document.getElementById("priceInput");
        const categoryInput = document.getElementById("categoryInput");
        const conditionInput = document.getElementById("conditionInput");
        const wechatInput = document.getElementById("wechatInput");

        // 点击“返回首页”按钮，跳回商品列表页
        backButton.addEventListener("click", function () {
            window.location.href = "index.html";
        });

        // 监听表单提交事件；submit 事件会在点击“发布商品”时触发
        publishForm.addEventListener("submit", function (event) {
            // 阻止浏览器默认提交表单，改为用 fetch 发送 JSON 请求
            event.preventDefault();
            publishProduct();
        });

        // 发布商品：POST http://localhost:8080/products
        async function publishProduct() {
            // 按钮禁用期间不再提交，避免用户连续点击产生重复请求
            if (submitButton.disabled) {
                return;
            }

            const priceText = priceInput.value.trim();

            // 这里的字段名要和后端 Product 实体中的属性名保持一致
            const product = {
                title: titleInput.value.trim(),
                description: descriptionInput.value.trim(),
                price: Number(priceText),
                category: categoryInput.value.trim(),
                conditionLevel: conditionInput.value.trim(),
                contactWechat: wechatInput.value.trim()
            };

            // 按顺序检查每个字段，让用户能看到具体、容易理解的错误提示
            if (!product.title) {
                showMessage("请输入商品标题", "error");
                return;
            }

            if (product.title.length < 2) {
                showMessage("商品标题至少需要 2 个字", "error");
                return;
            }

            if (!product.description) {
                showMessage("请输入商品描述", "error");
                return;
            }

            if (product.description.length < 5) {
                showMessage("商品描述至少需要 5 个字", "error");
                return;
            }

            if (!priceText || Number.isNaN(product.price) || product.price < 0) {
                showMessage("请输入大于等于 0 的数字价格", "error");
                return;
            }

            if (!product.category) {
                showMessage("请选择商品分类", "error");
                return;
            }

            if (!product.conditionLevel) {
                showMessage("请输入商品成色", "error");
                return;
            }

            if (!product.contactWechat) {
                showMessage("请输入卖家微信", "error");
                return;
            }

            submitButton.disabled = true;
            submitButton.textContent = "正在发布...";
            showMessage("正在发布商品...", "");

            let publishSucceeded = false;

            try {
                const response = await fetch(API_BASE_URL + "/products", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(product)
                });

                if (!response.ok) {
                    showMessage("商品发布失败，请稍后重试。", "error");
                    return;
                }

                publishSucceeded = true;
                showMessage("商品发布成功，即将返回首页", "success");

                // 等 1 秒再跳转，让用户能看到成功提示
                setTimeout(function () {
                    window.location.href = "index.html";
                }, 1000);
            } catch (error) {
                showMessage("商品发布失败，请确认后端服务已经启动。", "error");
                console.error("请求 POST /products 失败：", error);
            } finally {
                // 发布失败时允许再次提交；成功时保持禁用，等待页面自动跳转
                if (!publishSucceeded) {
                    submitButton.disabled = false;
                    submitButton.textContent = "发布商品";
                }
            }
        }

        // 显示提示信息，type 可以是 success、error 或空字符串
        function showMessage(text, type) {
            message.textContent = text;
            message.className = "message";

            if (type) {
                message.classList.add(type);
            }
        }
    </script>
</body>
</html>
