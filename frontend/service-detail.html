<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务详情</title>
    <style>
        body { margin: 0; font-family: Arial, "Microsoft YaHei", sans-serif; background-color: #f5f7fb; color: #222; }
        .page { max-width: 900px; margin: 0 auto; padding: 24px; }
        h1 { margin: 0 0 18px; font-size: 28px; }
        .top-bar { margin-bottom: 18px; }
        .back-button { padding: 10px 18px; border: none; border-radius: 6px; background-color: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
        .back-button:hover { background-color: #1d4ed8; }
        .message { margin: 12px 0; color: #666; }
        .detail-card { background-color: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 22px; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); }
        .service-name { margin: 0 0 10px; font-size: 26px; font-weight: bold; }
        .service-price { margin: 0 0 18px; color: #dc2626; font-size: 24px; font-weight: bold; }
        .info-row { display: flex; gap: 10px; margin: 10px 0; font-size: 15px; line-height: 1.6; }
        .info-label { width: 90px; flex: none; color: #555; font-weight: bold; }
        .info-value { flex: 1; color: #333; word-break: break-word; }
        /* 服务类型使用和商品分类一致的浅色小标签 */
        .info-value.badge { flex: 0 1 auto; max-width: 100%; box-sizing: border-box; padding: 4px 9px; border-radius: 6px; background-color: #eef2ff; color: #1d4ed8; font-size: 12px; line-height: 1.4; }
        .description { white-space: pre-wrap; }
        /* 微信号和复制按钮放在同一行，样式与页面现有按钮保持一致 */
        .wechat-content { flex: 1; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .copy-button { padding: 6px 12px; border: none; border-radius: 6px; background-color: #2563eb; color: #fff; font-size: 14px; cursor: pointer; }
        .copy-button:hover { background-color: #1d4ed8; }
        /* 下架属于危险操作，使用克制的浅红色样式提醒用户 */
        .offline-button { width: 100%; margin-top: 20px; padding: 12px 0; border: 1px solid #fca5a5; border-radius: 6px; background-color: #fef2f2; color: #b91c1c; font-size: 16px; cursor: pointer; }
        .offline-button:hover { background-color: #fee2e2; }
        .offline-button:disabled { color: #9ca3af; border-color: #e5e7eb; background-color: #f9fafb; cursor: not-allowed; }

        /* 六个页面共用的顶部导航栏 */
        .site-nav { background-color: #fff; border-bottom: 1px solid #e5e7eb; box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03); }
        .site-nav-inner { max-width: 1100px; margin: 0 auto; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
        .site-title { font-size: 18px; font-weight: bold; color: #111827; }
        .nav-links { display: flex; gap: 8px; }
        .nav-link { padding: 8px 12px; border-radius: 6px; color: #374151; text-decoration: none; font-size: 14px; }
        .nav-link:hover { background-color: #eef2ff; color: #1d4ed8; }
        .nav-link.active { background-color: #2563eb; color: #fff; }

        /* 手机端适配：减小留白，并让详情内容按单列阅读 */
        @media (max-width: 600px) {
            .site-nav-inner { padding: 12px 16px; align-items: flex-start; }
            .site-title, .nav-links { width: 100%; }
            .nav-links { display: grid; grid-template-columns: 1fr 1fr; }
            .nav-link { text-align: center; }
            .page { padding: 16px; }
            .back-button, .offline-button { width: 100%; min-height: 44px; }
            .detail-card { padding: 16px; }
            .info-row { display: block; }
            .info-label { width: auto; margin-bottom: 2px; }
            .wechat-content { align-items: stretch; }
            .copy-button { min-height: 40px; }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <div class="site-nav-inner">
            <div class="site-title">南航上海路校园生活小站</div>
            <div class="nav-links">
                <!-- 服务模块内只保留返回首页和当前模块入口，不直接跳转到二手闲置 -->
                <a class="nav-link" href="home.html">返回首页</a>
                <a class="nav-link active" href="service.html">校园服务</a>
            </div>
        </div>
    </nav>

    <main class="page">
        <div class="top-bar">
            <button id="backButton" class="back-button" type="button">返回服务列表</button>
        </div>

        <h1>服务详情</h1>
        <p id="message" class="message">正在加载服务详情...</p>
        <section id="detailCard" class="detail-card"></section>
        <button id="offlineButton" class="offline-button" type="button">下架服务</button>
    </main>

    <script>
        // 后端接口基础地址
        const API_BASE_URL = "http://localhost:8080";

        const backButton = document.getElementById("backButton");
        const message = document.getElementById("message");
        const detailCard = document.getElementById("detailCard");
        const offlineButton = document.getElementById("offlineButton");

        // 默认先隐藏“下架服务”按钮；如果地址中有服务 id，再显示按钮
        offlineButton.style.display = "none";

        // 返回服务列表页
        backButton.addEventListener("click", function () {
            window.location.href = "service.html";
        });

        // 从当前页面地址读取 id，例如 service-detail.html?id=1
        const params = new URLSearchParams(window.location.search);
        const serviceId = params.get("id");

        if (!serviceId) {
            message.textContent = "地址中没有服务 id，请从服务列表点击“查看详情”进入。";
            detailCard.style.display = "none";
        } else {
            offlineButton.style.display = "block";
            loadServiceDetail(serviceId);
        }

        // 点击“下架服务”按钮，先让用户确认，避免误操作
        offlineButton.addEventListener("click", function () {
            offlineService(serviceId);
        });

        // 请求服务详情：GET http://localhost:8080/service-items/{id}
        async function loadServiceDetail(id) {
            message.textContent = "正在加载服务详情...";
            detailCard.innerHTML = "";

            try {
                const response = await fetch(API_BASE_URL + "/service-items/" + id);
                if (!response.ok) {
                    message.textContent = "服务详情加载失败，请确认服务 id 是否存在。";
                    detailCard.style.display = "none";
                    return;
                }

                const service = await response.json();
                renderServiceDetail(service);
            } catch (error) {
                message.textContent = "服务详情加载失败，请确认后端服务已经启动。";
                detailCard.style.display = "none";
                console.error("请求 /service-items/{id} 失败：", error);
            }
        }

        // 把后端返回的服务对象显示到页面上
        function renderServiceDetail(service) {
            if (!service) {
                message.textContent = "没有找到服务详情。";
                detailCard.style.display = "none";
                return;
            }

            message.textContent = "";
            detailCard.style.display = "block";

            const name = document.createElement("h2");
            name.className = "service-name";
            name.textContent = service.name || "未命名服务";

            const priceInfo = document.createElement("p");
            priceInfo.className = "service-price";
            priceInfo.textContent = service.priceInfo || "价格面议";

            detailCard.appendChild(name);
            detailCard.appendChild(priceInfo);
            detailCard.appendChild(createInfoRow("服务类型", service.type || "未填写", "badge"));
            detailCard.appendChild(createInfoRow("服务说明", service.description || "暂无说明", "description"));
            detailCard.appendChild(createWechatRow("联系微信", service.contactWechat));
            // status 仍由后端用于上下架判断，普通用户的详情页不需要展示
            detailCard.appendChild(createInfoRow("发布时间", formatTime(service.createdTime)));
        }

        // 创建微信信息行，并在微信号旁边添加“复制微信”按钮
        function createWechatRow(labelText, wechatText) {
            const row = document.createElement("div");
            row.className = "info-row";

            const label = document.createElement("div");
            label.className = "info-label";
            label.textContent = labelText + "：";

            const content = document.createElement("div");
            content.className = "wechat-content";

            const value = document.createElement("div");
            value.className = "info-value";
            value.textContent = wechatText || "未填写";

            const copyButton = document.createElement("button");
            copyButton.className = "copy-button";
            copyButton.type = "button";
            copyButton.textContent = "复制微信";
            copyButton.addEventListener("click", function () {
                copyWechat(wechatText);
            });

            content.appendChild(value);
            content.appendChild(copyButton);
            row.appendChild(label);
            row.appendChild(content);
            return row;
        }

        // 优先使用浏览器剪贴板 API，不支持时使用临时 textarea 兼容复制
        async function copyWechat(wechatText) {
            const text = (wechatText || "").trim();
            if (!text) {
                alert("暂无微信号可复制");
                return;
            }

            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                } else {
                    fallbackCopyText(text);
                }
                alert("微信号已复制");
            } catch (error) {
                try {
                    fallbackCopyText(text);
                    alert("微信号已复制");
                } catch (fallbackError) {
                    alert("复制失败，请手动复制微信号");
                    console.error("复制微信号失败：", fallbackError);
                }
            }
        }

        // 兼容不支持 navigator.clipboard 的旧浏览器
        function fallbackCopyText(text) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.opacity = "0";
            document.body.appendChild(textarea);
            textarea.select();

            const copied = document.execCommand("copy");
            document.body.removeChild(textarea);
            if (!copied) {
                throw new Error("浏览器未能完成复制");
            }
        }

        // 下架服务：PUT http://localhost:8080/service-items/{id}/offline
        async function offlineService(id) {
            const confirmed = confirm("确认下架该服务吗？下架后将不会在服务列表中显示。");
            if (!confirmed) {
                return;
            }

            // 请求期间禁用按钮，避免连续点击重复发送下架请求
            offlineButton.disabled = true;
            offlineButton.textContent = "正在下架...";

            try {
                const response = await fetch(API_BASE_URL + "/service-items/" + id + "/offline", {
                    method: "PUT"
                });

                const resultText = await response.text();

                if (!response.ok || resultText !== "服务下架成功") {
                    alert("服务下架失败，请稍后重试");
                    offlineButton.disabled = false;
                    offlineButton.textContent = "下架服务";
                    return;
                }

                alert("服务已下架，即将返回服务列表");

                // 等 1 秒再返回列表，让用户明确知道下架已经成功
                setTimeout(function () {
                    window.location.href = "service.html";
                }, 1000);
            } catch (error) {
                alert("服务下架失败，请确认后端服务已经启动");
                offlineButton.disabled = false;
                offlineButton.textContent = "下架服务";
                console.error("请求 PUT /service-items/{id}/offline 失败：", error);
            }
        }

        // 创建一行详情信息
        function createInfoRow(labelText, valueText, extraClassName) {
            const row = document.createElement("div");
            row.className = "info-row";

            const label = document.createElement("div");
            label.className = "info-label";
            label.textContent = labelText + "：";

            const value = document.createElement("div");
            value.className = "info-value";
            if (extraClassName) {
                // 允许传入多个类名，方便以后组合不同标签样式
                value.classList.add(...extraClassName.split(" "));
            }
            value.textContent = valueText;

            row.appendChild(label);
            row.appendChild(value);
            return row;
        }

        // 简单格式化后端返回的时间
        function formatTime(timeText) {
            if (!timeText) {
                return "未填写";
            }
            return timeText.replace("T", " ");
        }
    </script>
</body>
</html>
